version: "3.9"

# ─────────────────────────────────────────────────────────────────
# TextClear  —  Full Stack
# ─────────────────────────────────────────────────────────────────
# Services
#   api      FastAPI server          http://localhost:8000
#   worker   Celery worker           (background)
#   redis    Message broker          redis://localhost:6379
#   flower   Celery monitoring UI    http://localhost:5555
#   nginx    Static frontend + proxy http://localhost:3000
#
# Quick start
#   docker compose up --build
# ─────────────────────────────────────────────────────────────────

services:

  # ── Redis broker + result backend ───────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI server ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn backend.server:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - uploads_vol:/app/data/uploads
      - results_vol:/app/data/results
      - ./data/jobs.db:/app/data/jobs.db
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Celery worker ───────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.worker.celery_app worker --loglevel=info --concurrency=2
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - uploads_vol:/app/data/uploads
      - results_vol:/app/data/results
      - ./data/jobs.db:/app/data/jobs.db
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 1          # scale to N with: docker compose up --scale worker=4
      resources:
        limits:
          cpus: "4"
          memory: 8G

  # ── Flower — Celery monitoring ──────────────────────────────
  flower:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.worker.celery_app flower --port=5555 --broker=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker

  # ── Nginx — serves built frontend + proxies /api and /ws ───
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  uploads_vol:
  results_vol:
